<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple security check</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            text-align: center;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #ffffff;
            padding: 40px 30px;
            max-width: 620px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        
        .logo {
            width: 180px;
            height: 180px;
            background: url('https://via.placeholder.com/180x180/ffffff/000000?text=LOGO') center/contain no-repeat;
            margin: 0 auto 30px;
            border: 3px solid #ffffff;
            border-radius: 50%;
        }
        
        h1 {
            font-size: 28px;
            margin: 15px 0 10px;
        }
        
        p.subtitle {
            font-size: 16px;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .form-group {
            margin: 18px 0;
        }
        
        input {
            background: #111111;
            border: 2px solid #ffffff;
            color: #ffffff;
            padding: 14px 20px;
            width: 85%;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: #cccccc;
        }
        
        button {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 60px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 25px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #cccccc;
            transform: scale(1.03);
        }
        
        #loading {
            display: none;
            margin: 40px auto;
        }
        
        .spinner {
            width: 90px;
            height: 90px;
            border: 6px solid #333333;
            border-top: 6px solid #ffffff;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            margin: 0 auto 25px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .analysis-text {
            color: #dddddd;
            margin: 20px 0;
            min-height: 160px;
            line-height: 1.6;
            font-size: 15px;
        }
        
        #result {
            display: none;
            font-size: 22px;
            line-height: 1.5;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"></div><img src="719C3727-4C2B-4FDF-AFCB-428E64B0CE20.png"
        <h1>Apple security check</h1>
        <p class="subtitle">Enter your information below for a full security check</p>
        
        <div class="form-group">
            <input type="text" id="name" placeholder="Full Name" required>
        </div>
        <div class="form-group">
            <input type="email" id="email" placeholder="Email Address" required>
        </div>
        <div class="form-group">
            <input type="tel" id="phone" placeholder="Phone Number" required>
        </div>
        <div class="form-group">
            <input type="text" id="ip" placeholder="IP Address" value="192.168.1.1" required>
        </div>
        
        <button onclick="startScan()">CHECK SECURITY</button>
        
        <div id="loading">
            <div class="spinner"></div>
            <div class="analysis-text" id="analysis">Analyzing security vulnerabilities...</div>
        </div>
        
        <div id="result"></div>
    </div>

    <script>
        const analysisMessages = [
            "Scanning open ports...",
            "Analyzing firewall configuration...",
            "Checking for malware signatures...",
            "Evaluating encryption strength...",
            "Reviewing database records...",
            "Testing SSL certificate...",
            "Detecting potential risks..."
        ];
        
        function startScan() {
            document.querySelector('button').style.display = 'none';
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            
            let index = 0;
            const analysisEl = document.getElementById('analysis');
            
            const interval = setInterval(() => {
                analysisEl.textContent = analysisMessages[index % analysisMessages.length];
                index++;
            }, 1700);
            
            setTimeout(() => {
                clearInterval(interval);
                loading.style.display = 'none';
                
                const resultEl = document.getElementById('result');
                resultEl.style.display = 'block';
                resultEl.innerHTML = `
                    Security Level: <strong>9%</strong><br><br>
                    High Risk Detected<br>
                    Over 214 million websites scanned on the internet
                `;
            }, 120000); // 2 minutes
        }
    </script>
</body>
</html>
